name: Mirror to original repository

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

env:
  TARGET_REPOSITORY: ${{ vars.MIRROR_TARGET_REPOSITORY || 'avdelag1/swipess' }}

jobs:
  mirror:
    name: Push main to original repo
    runs-on: ubuntu-latest

    steps:
      - name: Skip guard
        id: guard
        run: |
          if [ "${TARGET_REPOSITORY}" = "${GITHUB_REPOSITORY}" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout Lovable-connected repository
        if: steps.guard.outputs.skip != 'true'
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate mirror configuration
        if: steps.guard.outputs.skip != 'true'
        env:
          MIRROR_TOKEN: ${{ secrets.MIRROR_REPO_TOKEN }}
        run: |
          if [ -z "${MIRROR_TOKEN}" ]; then
            echo "::error::MIRROR_REPO_TOKEN is missing. Add a GitHub fine-grained PAT with Contents read/write access to ${TARGET_REPOSITORY}."
            exit 1
          fi

      - name: Mirror current main to original repository
        if: steps.guard.outputs.skip != 'true'
        env:
          MIRROR_TOKEN: ${{ secrets.MIRROR_REPO_TOKEN }}
        run: |
          git config user.name "swipess-sync-bot"
          git config user.email "actions@github.com"
          git remote add original "https://x-access-token:${MIRROR_TOKEN}@github.com/${TARGET_REPOSITORY}.git"
          git fetch original main || true
          # Force-push because the Lovable-connected repo is the source of truth.
          git push original HEAD:main --force