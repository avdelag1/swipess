name: Deploy Supabase Edge Functions

on:
  workflow_dispatch:
    inputs:
      function:
        description: 'Which function to deploy'
        required: false
        type: choice
        options:
          - all
          - delete-user
          - moderate-image
          - send-push-notification
        default: 'all'

  push:
    branches:
      - main
    paths:
      - 'supabase/functions/**'

jobs:
  deploy-functions:
    runs-on: ubuntu-latest

    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy Edge Functions
        run: |
          if [ "${{ github.event.inputs.function }}" == "all" ] || [ "${{ github.event.inputs.function }}" == "" ]; then
            echo "Deploying ALL functions..."
            supabase functions deploy delete-user --project-ref $PROJECT_REF
            supabase functions deploy moderate-image --project-ref $PROJECT_REF
            supabase functions deploy send-push-notification --project-ref $PROJECT_REF
          else
            echo "Deploying ${{ github.event.inputs.function }}..."
            supabase functions deploy ${{ github.event.inputs.function }} --project-ref $PROJECT_REF
          fi
