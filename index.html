  <!-- Reduced Motion: apply class when user prefers reduced motion -->
  <script>
    if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) {
      document.documentElement.classList.add('reduce-motion');
    }
  </script>

  <!-- Android immersive mode: hide the phone navigation bar on first touch.
       For installed PWA users this is already handled by display:fullscreen in
       the manifest. This script covers users opening the app in a browser tab. -->
  <script>
    (function () {
      if (!/Android/i.test(navigator.userAgent)) return;
      // Skip if already running as an installed PWA (standalone / fullscreen mode)
      if (window.matchMedia('(display-mode: standalone)').matches) return;
      if (window.matchMedia('(display-mode: fullscreen)').matches) return;
      var req = document.documentElement.requestFullscreen
        || document.documentElement.webkitRequestFullscreen;
      if (!req) return;
      function enterFullscreen() {
        req.call(document.documentElement, { navigationUI: 'hide' }).catch(function () {});
        document.removeEventListener('touchstart', enterFullscreen);
      }
      document.addEventListener('touchstart', enterFullscreen, { passive: true, once: true });
    })();
  </script>


  <!-- Speculation Rules API — only prefetch known high-value routes -->

  <script type="speculationrules">

  <!-- Defer cache cleanup until after main content loads -->
  <script>
    // Cache cleanup for legacy cache names (runs during idle time)
    const cleanupCaches = () => {
      try {
        if (localStorage.getItem('swipes_last_clear') !== '3.0.0') {
          if ('caches' in window) {
            caches.keys().then((names) => {
              names.forEach((name) => {
                if (name.startsWith('swipes-') || name.startsWith('swipematch-') || name.startsWith('tinderent-')) {
                  caches.delete(name);
                }
              });
            });
          }
          localStorage.setItem('swipes_last_clear', '3.0.0');
        }
      } catch { }
    };

    // Defer cleanup to not block critical rendering
    if ('requestIdleCallback' in window) {
      requestIdleCallback(cleanupCaches, { timeout: 5000 });
    } else {
      setTimeout(cleanupCaches, 3000);
    }
  </script>
