  <script>
    // PWA Hard Refresh / Version Control
    const PWA_VERSION = "3.1.9";
    if (localStorage.getItem('pwa_version') !== PWA_VERSION) {
      if ('caches' in window) {
         caches.keys().then(names => {
           for (let name of names) caches.delete(name);
         }).then(() => {
           localStorage.setItem('pwa_version', PWA_VERSION);
           console.log('[PWA] Cache purged for version ' + PWA_VERSION);
         });
      }
    }

    // CLEANUP STALE CACHES ON IDLE
    const cleanupCaches = () => {
      try {
        if (localStorage.getItem('swipes_last_clear') !== '3.1.9') {
          if ('caches' in window) {
            caches.keys().then((names) => {
              names.forEach((name) => {
                if (name.startsWith('swipes-')) caches.delete(name);
              });
            });
          }
          localStorage.setItem('swipes_last_clear', '3.1.9');
        }
      } catch { }
    };
    if ('requestIdleCallback' in window) requestIdleCallback(cleanupCaches, { timeout: 10000 });
    else setTimeout(cleanupCaches, 8000);
  </script>
