<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover, interactive-widget=resizes-content" />
  <meta name="format-detection" content="telephone=no">
  <meta name="theme-color" content="#0A0A0B">
  <meta name="app-version" content="3.7.0">
  
  <!-- 🚀 CRITICAL RESOURCE PRELOADS -->
  <link rel="preload" href="/icons/swipess-wordmark-512.png" as="image" type="image/png" fetchpriority="high">
  <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preconnect" href="https://vlkndvqukyzjyfmxzqxs.supabase.co" crossorigin>

  <script>
    /** 🚀 ZENITH: CORE PERFORMANCE PROTOCOL */
    (function() {
      const theme = localStorage.getItem('swipess_theme_preference') || 'light';
      const root = document.documentElement;
      root.classList.add(theme);
      root.style.backgroundColor = theme === 'dark' ? '#000000' : '#ffffff';
      root.style.colorScheme = theme === 'dark' ? 'dark' : 'light';
      
      const originalAddEventListener = window.EventTarget.prototype.addEventListener;
      window.EventTarget.prototype.addEventListener = function(type, listener, options) {
        let op = options;
        if (type === 'touchstart' || type === 'touchmove') {
          if (typeof options === 'boolean') op = { capture: options, passive: true };
          else if (typeof options === 'object') op = { ...options, passive: true };
          else op = { passive: true };
        }
        originalAddEventListener.call(this, type, listener, op);
      };

      const swallowError = (e) => {
        const stack = (e.reason && e.reason.stack) || (e.error && e.error.stack) || '';
        if (stack.includes('chrome-extension://')) { e.stopImmediatePropagation?.(); return true; }
        return false;
      };
      window.addEventListener('error', swallowError, true);
      window.addEventListener('unhandledrejection', swallowError, true);
    })();
  </script>

  <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Quicksand:wght@600;700&family=Poppins:wght@600;700&family=Inter:wght@400;600&display=swap" onload="this.onload=null;this.rel='stylesheet'">
  <noscript><link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@600;700&family=Poppins:wght@600;700&family=Inter:wght@400;600&display=swap" rel="stylesheet"></noscript>

  <title>Swipess | The High-Frequency Discovery Network</title>
  <meta name="description" content="Tulum's elite marketplace for luxury real estate, high-performance vehicles, and world-class service professionals. Swipe. Match. Dominate.">
  
  <style>
    /** 🚀 ZENITH CORE STYLES */
    *{touch-action:manipulation;-webkit-tap-highlight-color:transparent;-webkit-user-select:none;user-select:none}
    input,textarea,select,[contenteditable="true"]{-webkit-user-select:text;user-select:text;touch-action:auto}
    :root{--safe-top:env(safe-area-inset-top,0px);--safe-bottom:env(safe-area-inset-bottom,0px)}
    html,body{margin:0;padding:0;overflow:hidden;background:#000;width:100%;height:100%;color:#fff;font-family:system-ui,-apple-system,sans-serif;-webkit-font-smoothing:antialiased}

    #initial-loader{
      display:flex;flex-direction:column;align-items:center;justify-content:center;
      width:100vw;height:100dvh;background:#000;
      position:fixed;top:0;left:0;z-index:9999;
      transition: opacity 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    }
    #initial-loader.dissolving { opacity: 0; pointer-events: none; }
    
    .splash-logo{
      width:220px;height:45px;
      animation:heartbeat 2s ease-in-out infinite;
      will-change: transform, opacity;
      -webkit-mask: url(/icons/swipess-wordmark-512.png) center/contain no-repeat;
      mask: url(/icons/swipess-wordmark-512.png) center/contain no-repeat;
      background: linear-gradient(135deg, #ff4d00, #ff6b35);
    }
    @keyframes heartbeat{
      0%, 100% { transform: scale(1); opacity: 0.9; }
      10%, 30% { transform: scale(1.04); opacity: 1; }
      20% { transform: scale(1); opacity: 0.9; }
      40% { transform: scale(1); opacity: 0.9; }
    }
    .loader-bar{width:180px;height:2px;background:rgba(255,255,255,0.05);border-radius:10px;margin-top:32px;position:relative;overflow:hidden;}
    .loader-progress{position:absolute;inset:0;width:100%;background:linear-gradient(90deg,transparent 0%,#ff4d00 50%,transparent 100%);animation:loader-slide 1.5s ease-in-out infinite;}
    @keyframes loader-slide{from{transform:translateX(-100%)}to{transform:translateX(100%)}}

    .stars-lite{position:absolute;inset:0;background:radial-gradient(1px 1px at 20px 30px, #fff, rgba(0,0,0,0)), radial-gradient(1px 1px at 40px 70px, #fff, rgba(0,0,0,0)), radial-gradient(1px 1px at 50px 160px, #fff, rgba(0,0,0,0));background-size: 200px 200px;opacity: 0.1;animation: stars-drift 100s linear infinite;}
    @keyframes stars-drift{from{background-position:0 0}to{background-position:0 -1000px}}

    #root{opacity:0;transition:opacity 0.4s ease-out;will-change:opacity}
    #root.hydrated{opacity:1}
  </style>

  <link rel="manifest" href="/manifest.json">

  <!-- Unified Brand Favicons -->
  <link rel="icon" type="image/png" href="/favicon.png">
  <link rel="icon" type="image/x-icon" href="/favicon.ico">
  <link rel="icon" type="image/png" sizes="32x32" href="/icons/icon-32.png">
  <link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192.png">
  <link rel="icon" type="image/png" sizes="512x512" href="/icons/swipess-wordmark-512.png">

  <!-- Apple iOS / iPadOS -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="SwipesS">
  <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png">

  <!-- Windows / Microsoft -->
  <meta name="msapplication-TileImage" content="/icons/swipess-wordmark-512.png">
  <meta name="msapplication-TileColor" content="#0A0A0B">
</head>

<body>
  <div id="initial-loader">
    <div class="stars-lite"></div>
    <div class="splash-logo"></div>
    <div class="loader-bar"><div class="loader-progress"></div></div>
  </div>

  <div id="mount-recovery" style="display:none;position:fixed;bottom:10vh;left:0;right:0;padding:20px;text-align:center;z-index:20000;">
    <p style="color:rgba(255,255,255,0.6);font-size:12px;margin-bottom:12px;font-weight:600;letter-spacing:0.05em;">APP INITIALIZATION DELAYED</p>
    <button style="background:#ff4d00;color:#fff;border:none;padding:14px 28px;border-radius:50px;font-weight:700;font-size:14px;cursor:pointer;text-transform:uppercase;" onclick="location.reload()">Reload App</button>
  </div>

  <script>
    window.__APP_INITIALIZED__ = false;

    function removeSplash() {
      var loader = document.getElementById('initial-loader');
      var root = document.getElementById('root');
      if (root) root.classList.add('hydrated');
      if (loader && !loader.classList.contains('dissolving')) {
        loader.classList.add('dissolving');
        setTimeout(function() { if(loader.parentNode) loader.remove(); }, 600);
      }
    }

    var mountTimer = setTimeout(function() {
      if (!window.__APP_INITIALIZED__) {
        removeSplash();
        setTimeout(function() {
          var root = document.getElementById('root');
          if (!root || !root.firstChild) document.getElementById('mount-recovery').style.display = 'block';
        }, 1000);
      }
    }, 5000);

    window.addEventListener('app-rendered', function() {
      window.__APP_INITIALIZED__ = true;
      clearTimeout(mountTimer);
      requestAnimationFrame(function() {
        requestAnimationFrame(removeSplash);
      });
    });

    window.addEventListener('load', function() {
      setTimeout(function() {
        var V = "3.7.0";
        if(localStorage.getItem('pwa_version') !== V) {
          if('caches' in window) caches.keys().then(function(n){n.forEach(function(k){caches.delete(k)})}).then(function(){localStorage.setItem('pwa_version',V);});
        }
      }, 10000);
    });
  </script>

  <div id="root"></div>
  <script type="module" src="/src/main.tsx" fetchpriority="high"></script>

  <script>
    if('serviceWorker' in navigator) {
      window.addEventListener('load', function() {
        navigator.serviceWorker.register('/sw.js').catch(function(e){});
      });
    }
  </script>
</body>
</html>
