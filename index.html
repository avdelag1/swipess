  <link rel="dns-prefetch" href="https://fonts.googleapis.com">


  <script>
    /**
     * 🚀 CONNECTION WARMUP & ROLE PREDICTION
     * This script runs before the main app bundle to eliminate ~200ms of idle time.
     */
    (function() {
      // 1. Warm up the API connection (pre-resolve SSL/TLS)


      // 2. Predictive Chunk Loading
      // We check the role from storage to pre-load the right dashboard JS immediately.
      try {
        const lastRole = localStorage.getItem('swipess_user_role') || 'client';
        // We can't know the exact hash here without a complex build setup, 
        // but we can signal the browser to prioritize the eventual fetch.
        window.__PREDICTED_ROLE = lastRole;
      } catch(e) {}
      
      const theme = 'dark'; // Force dark for initial paint
      const root = document.documentElement;
      root.classList.add(theme, 'black-matte');
      root.style.backgroundColor = '#000000';
      root.style.colorScheme = 'dark';
      
      const originalAddEventListener = window.EventTarget.prototype.addEventListener;
      window.EventTarget.prototype.addEventListener = function(type, listener, options) {
        let op = options;
        if (type === 'touchstart' || type === 'touchmove') {
          if (typeof options === 'boolean') op = { capture: options, passive: true };
          else if (typeof options === 'object') op = { ...options, passive: true };
          else op = { passive: true };
        }
        originalAddEventListener.call(this, type, listener, op);
      };
    })();
  </script>

  <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;900&family=Outfit:wght@600;900&display=swap" onload="this.onload=null;this.rel='stylesheet'">

  <style id="splash-styles">
    *{touch-action:manipulation;-webkit-tap-highlight-color:transparent;-webkit-user-select:none;user-select:none}
    input,textarea,select,[contenteditable="true"]{-webkit-user-select:text;user-select:text;touch-action:auto}
    :root{--safe-top:env(safe-area-inset-top,0px);--safe-bottom:env(safe-area-inset-bottom,0px)}
    html,body{margin:0;padding:0;overflow:hidden;background:#000;width:100%;height:100%;color:#fff;font-family: 'Inter', system-ui, -apple-system, sans-serif;-webkit-font-smoothing:antialiased}

    #initial-loader{
      display:flex;flex-direction:column;align-items:center;justify-content:center;
      width:100vw;height:100dvh;background:#000;
      position:fixed;top:0;left:0;z-index:9999;
      transition: opacity 0.2s cubic-bezier(0.4, 0, 0.2, 1);
    }
    #initial-loader.dissolving { opacity: 0; pointer-events: none; }
    
    .splash-wordmark{
      font-family: 'Inter', 'Outfit', sans-serif;
      font-weight: 950;
      font-size: 3.5rem; /* Slightly smaller for better framing on mobile */
      text-transform: uppercase;
      letter-spacing: -0.04em;
      color: #FFFFFF;
      font-style: italic;
      padding-right: 0.25em; /* CRITICAL: Prevents italic clipping */
      display: inline-block;
      animation: heartbeat 2s ease-in-out infinite;
      -webkit-user-select: none;
      user-select: none;
    }
    @keyframes heartbeat{
      0%, 100% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.02); opacity: 0.85; }
    }

    #root{opacity:0;transition:opacity 0.1s ease-out}
    #root.hydrated{opacity:1}
  </style>

  <link rel="manifest" href="/manifest.json">

<body>
  <div id="initial-loader">
    <img src="/icons/swipess-wordmark-transparent-v2.png" alt="Swipess" width="280" style="height:3.2rem;object-fit:contain;animation:heartbeat 2s ease-in-out infinite;" draggable="false" fetchpriority="high" />
  </div>

  <script>
    window.__APP_INITIALIZED__ = false;
    function removeSplash() {
      var loader = document.getElementById('initial-loader');
      var root = document.getElementById('root');
      if (root) root.classList.add('hydrated');
      if (loader && !loader.classList.contains('dissolving')) {
        loader.classList.add('dissolving');
        setTimeout(function() { if(loader.parentNode) loader.remove(); }, 300);
      }
    }
    var mountTimer = setTimeout(removeSplash, 1500);
    window.addEventListener('app-rendered', function() {
      window.__APP_INITIALIZED__ = true;
      clearTimeout(mountTimer);
      requestAnimationFrame(removeSplash);
      setTimeout(function() {
        var ss = document.getElementById('splash-styles');
        if (ss) ss.remove();
      }, 500);
    });
  </script>

  <div id="root"></div>
  <script type="module" src="/src/main.tsx" fetchpriority="high"></script>
</body>
