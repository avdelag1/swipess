  <script>
    /**
     * 🚀 CONNECTION WARMUP & ROLE PREDICTION
     * This script runs before the main app bundle to eliminate ~200ms of idle time.
     */
    (function() {
      // 1. Warm up the API connection (pre-resolve SSL/TLS)


      // 2. Predictive Chunk Loading
      // We check the role from storage to pre-load the right dashboard JS immediately.
      try {
        const lastRole = localStorage.getItem('swipess_user_role') || 'client';
        // We can't know the exact hash here without a complex build setup, 
        // but we can signal the browser to prioritize the eventual fetch.
        window.__PREDICTED_ROLE = lastRole;
      } catch(e) {}
      
      const theme = 'dark'; // Force dark for initial paint
      const root = document.documentElement;
      root.classList.add(theme, 'black-matte');
      root.style.backgroundColor = '#000000';
      root.style.colorScheme = 'dark';
      
      // Passive touch patching deferred to requestIdleCallback
      (window.requestIdleCallback || setTimeout)(function() {
        var orig = window.EventTarget.prototype.addEventListener;
        window.EventTarget.prototype.addEventListener = function(type, listener, options) {
          var op = options;
          if (type === 'touchstart' || type === 'touchmove') {
            if (typeof options === 'boolean') op = { capture: options, passive: true };
            else if (typeof options === 'object') op = { ...options, passive: true };
            else op = { passive: true };
          }
          orig.call(this, type, listener, op);
        };
      });
    })();
  </script>

  <style>
    .static-splash { position: fixed; inset: 0; background: #000; z-index: 99999; display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 28px; }
    .static-splash.fade-out { opacity: 0; visibility: hidden; transition: opacity 0.65s cubic-bezier(0.22,1,0.36,1), visibility 0.5s; }
    .splash-content { display: flex; flex-direction: column; align-items: center; animation: splashBreathe 2.6s ease-in-out infinite; will-change: transform; }
    @keyframes splashBreathe { 0%,100% { transform: scale(1); } 50% { transform: scale(1.025); } }
    .splash-logo { height: 52px; width: auto; opacity: 1; filter: drop-shadow(0 0 24px rgba(255,255,255,0.18)); contain: content; }
    .splash-dot { width: 6px; height: 6px; border-radius: 999px; background: rgba(255,255,255,0.55); animation: splashDot 1.6s ease-in-out infinite; }
    @keyframes splashDot { 0%,100% { opacity: 0.25; transform: scale(0.85); } 50% { opacity: 0.85; transform: scale(1); } }

  <script>
    (function() {
      const splash = document.getElementById('static-splash');
      let appReady = false;
      let windowLoaded = false;
      const fadeOut = () => {
        if (splash && !splash.classList.contains('fade-out')) {
          splash.classList.add('fade-out');
          setTimeout(() => splash.remove(), 700);
        }
      };
      const tryFade = () => {
        // Only fade once BOTH the app shell has signaled ready AND
        // the window 'load' event has fired (meaning preloaded images,
        // fonts and other static assets are decoded). This keeps the
        // breathing Swipess wordmark on screen as a true loading page.
        if (appReady && windowLoaded) fadeOut();
      };
      window.addEventListener('swipess-ready', () => { appReady = true; tryFade(); });
      window.addEventListener('app-rendered', () => { appReady = true; tryFade(); });
      window.addEventListener('load', () => {
        // Give the browser a beat to paint the first frame of real UI
        // underneath before we fade the splash.
        windowLoaded = true;
        setTimeout(tryFade, 250);
      });
      // Hard safety cap — never trap the user behind the splash.
      setTimeout(fadeOut, 6000);
    })();
  </script>
