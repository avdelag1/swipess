<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="format-detection" content="telephone=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

  <!-- Resource Hints (Shaving off MS for 'Instant' feel) -->
  <link rel="dns-prefetch" href="https://vplgtcguxujxwrgguxqq.supabase.co">
  <link rel="dns-prefetch" href="https://images.unsplash.com">
  <link rel="dns-prefetch" href="https://fonts.googleapis.com">
  
  <!-- Critical Preconnects -->
  <link rel="preconnect" href="https://vplgtcguxujxwrgguxqq.supabase.co" crossorigin>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preconnect" href="https://images.unsplash.com" crossorigin>

  <!-- LCP IMAGE (Aggressive High Priority) -->
  <link rel="preload" as="image" href="/icons/fire-s-logo-960.webp" type="image/webp" fetchpriority="high">


  <!-- Critical styles for Instant App feel -->
  <style>
    /* 🚀 INSTANT RESPONSE SYSTEM: Removes Tap Delay (300ms) globally */
    *{touch-action:manipulation;-webkit-tap-highlight-color:transparent;-webkit-user-select:none;user-select:none}
    input,textarea,select,[contenteditable="true"]{-webkit-user-select:text;user-select:text;touch-action:auto}
    
    :root{--safe-top:env(safe-area-inset-top,0px);--safe-bottom:env(safe-area-inset-bottom,0px)}
    html,body{margin:0;padding:0;overflow:hidden;background:#000;width:100%;height:100%;color:#fff;font-family:system-ui,-apple-system,sans-serif;-webkit-font-smoothing:antialiased}

    /* SPLASH: Unified High-Fidelity Splash (Dark Theme) */
    #initial-loader{
      display:flex;flex-direction:column;align-items:center;justify-content:center;
      width:100vw;height:100dvh;background:#000;
      position:fixed;top:0;left:0;z-index:9999;
    }
    .splash-logo{
      width:128px;height:128px;
      animation:splash-pulse 1.8s ease-in-out infinite;
      filter: drop-shadow(0 0 25px rgba(255, 31, 31, 0.4));
    }
    @keyframes splash-pulse{
      0%,100%{transform:scale(0.95);opacity:0.85;filter:drop-shadow(0 0 20px rgba(255, 31, 31, 0.3))}
      50%{transform:scale(1.05);opacity:1;filter:drop-shadow(0 0 45px rgba(255, 31, 31, 0.6))}
    }
    .loader-bar{
      width:160px;height:2px;background:rgba(255,255,255,0.05);
      border-radius:10px;margin-top:24px;position:relative;overflow:hidden;
    }
    .loader-progress{
      position:absolute;inset:0;width:100%;
      background:linear-gradient(90deg,transparent 0%,#ff1f1f 50%,transparent 100%);
      animation:loader-slide 1.5s ease-in-out infinite;
    }
    @keyframes loader-slide{from{transform:translateX(-100%)}to{transform:translateX(100%)}}


    /* CSS Star Field — renders instantly, no JS needed */
    .stars-container{position:absolute;top:0;left:0;width:100%;height:200%}
    #stars{position:absolute;inset:0;width:1px;height:1px;
      box-shadow:5vw 15vh #000,15vw 55vh #000,25vw 35vh #000,35vw 75vh #000,45vw 5vh #000,55vw 45vh #000,65vw 85vh #000,75vw 25vh #000,85vw 65vh #000,95vw 90vh #000,10vw 70vh #000,40vw 50vh #000,60vw 20vh #000,80vw 40vh #000,20vw 95vh #000,50vw 30vh #000,70vw 10vh #000,30vw 60vh #000,90vw 50vh #000,8vw 80vh #000,5vw 115vh #000,25vw 135vh #000,45vw 105vh #000,65vw 185vh #000,85vw 165vh #000;
      animation:animStar 80s linear infinite;opacity:0.05}
    #stars2{position:absolute;inset:0;width:2px;height:2px;
      box-shadow:8vw 30vh #000,28vw 10vh #000,48vw 90vh #000,68vw 60vh #000,88vw 80vh #000,32vw 85vh #000,52vw 5vh #000,72vw 55vh #000,2vw 55vh #000,18vw 170vh #000,38vw 150vh #000,58vw 120vh #000,78vw 140vh #000;
      animation:animStar 120s linear infinite;opacity:0.08}
    @keyframes animStar{from{transform:translateY(0)}to{transform:translateY(-50%)}}

    /* HIDE root until React paints — prevents flash of empty div */
    #root{opacity:0;transition:opacity 0.2s ease-out}
    #root.hydrated{opacity:1}
    /* Critical Extension Compatibility Styles */
    .skeleton-hidden { display: none !important; visibility: hidden; pointer-events: none; }
  </style>

  <!-- Defer font loading — never block paint -->
  <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Quicksand:wght@600;700&family=Poppins:wght@600;700&family=Inter:wght@400;600&display=swap" onload="this.onload=null;this.rel='stylesheet'">
  <noscript><link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@600;700&family=Poppins:wght@600;700&family=Inter:wght@400;600&display=swap" rel="stylesheet"></noscript>

  <!-- SEO & Extension Compatibility -->
  <title>Swipess | Your Local Jarvis</title>
  <meta name="description" content="High-performance platform for elite real estate, luxury vehicles, and world-class service providers. Discover excellence.">
  
  <!-- Social Metadata (Extensions often query these) -->
  <meta property="og:title" content="Swipess | Your Local Jarvis">
  <meta property="og:description" content="High-performance platform discovered excellence.">
  <meta property="og:type" content="website">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Swipess | Your Local Jarvis">

  <meta name="theme-color" content="#0A0A0B">
  <meta name="app-version" content="3.6.0">

  <!-- iOS PWA Support — required for "Add to Home Screen" on iPhone/iPad -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Swipess">
  <link rel="apple-touch-icon" href="/icons/fire-s-logo.png">
  <link rel="manifest" href="/manifest.json?v=20260331v1">
  <link rel="icon" type="image/png" sizes="32x32" href="/icons/fire-s-logo.png">


  <script>
    // 🛡️ EXTENSION GUARD: Silently swallow chrome-extension errors
    // Many extensions (like Stylus/UserStyle) crash when they can't find elements in SPAs.
    // This prevents these third-party errors from appearing as "app errors".
    window.addEventListener('error', function(e) {
      if (e.filename && e.filename.indexOf('chrome-extension://') !== -1) {
        e.stopImmediatePropagation();
        return false;
      }
    }, true);
  </script>
</head>

<body>
  <!-- EXTENSION COMPATIBILITY SKELETON: Satisfies extensions searching for basic structure -->
  <header id="zenith-compat-header" class="skeleton-hidden" aria-hidden="true"></header>
  <main id="zenith-compat-main" class="skeleton-hidden" aria-hidden="true"></main>
  <footer id="zenith-compat-footer" class="skeleton-hidden" aria-hidden="true"></footer>


  <!-- LCP ELEMENT: Splash screen IS the largest contentful paint -->
  <!-- By making the splash the LCP, we guarantee sub-1s LCP on any connection -->
  <div id="initial-loader">
    <div class="stars-container"><div id="stars"></div><div id="stars2"></div></div>
    <img src="/icons/fire-s-logo-960.webp" class="splash-logo" alt="Swipess" 
      width="128" height="128"
      style="width:128px;height:128px;object-fit:contain;" />
    <div class="loader-bar"><div class="loader-progress"></div></div>
  </div>


  <div id="root"></div>

  <!-- MAIN SCRIPT: type=module (deferred by default, non-blocking) -->
  <script type="module" src="/src/main.tsx"></script>

  <script>
    // PWA Version Control — runs synchronously but is fast (no network)
    var V="3.6.0";
    if(localStorage.getItem('pwa_version')!==V){
      if('caches' in window)caches.keys().then(function(n){n.forEach(function(k){caches.delete(k)})}).then(function(){localStorage.setItem('pwa_version',V); window.location.reload();});
    }

    // SW: graceful registration — suppress fetch errors from console
    if('serviceWorker' in navigator){
      navigator.serviceWorker.register('/sw.js').catch(function(e){
        // Silently fail on sw fetch error (common on first deploy or cache bust)
        console.warn('[SW] Registration skipped:', e.message);
      });
    }
  </script>
</body>

</html>
